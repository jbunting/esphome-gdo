# Example: two Security+ garage door openers on one ESP32.
# Build from the repo root with:  esphome compile example.yaml
esphome:
  name: garage-controller

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:  # console stays on UART0

api:
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# During development, load the component from this repo. To consume it from
# GitHub instead, use:
#   - source: github://jbunting/esphome-gdo
#     components: [secplus_gdo]
external_components:
  - source:
      type: local
      path: components
    components: [secplus_gdo]

secplus_gdo:
  - id: gdo_left
    tx_pin: 17
    rx_pin: 16
    invert_uart: true
    # uart_num auto-assigned to UART1
  - id: gdo_right
    tx_pin: 19
    rx_pin: 18
    invert_uart: true
    # uart_num auto-assigned to UART2

cover:
  - platform: secplus_gdo
    secplus_gdo_id: gdo_left
    name: Left Garage Door
    device_class: garage
  - platform: secplus_gdo
    secplus_gdo_id: gdo_right
    name: Right Garage Door
    device_class: garage

light:
  - platform: secplus_gdo
    secplus_gdo_id: gdo_left
    name: Left Garage Light
  - platform: secplus_gdo
    secplus_gdo_id: gdo_right
    name: Right Garage Light

lock:
  - platform: secplus_gdo
    secplus_gdo_id: gdo_left
    name: Left Garage Lock
  - platform: secplus_gdo
    secplus_gdo_id: gdo_right
    name: Right Garage Lock

# The remaining platforms are shown on the left opener only, for brevity.
binary_sensor:
  - platform: secplus_gdo
    secplus_gdo_id: gdo_left
    type: motion
    name: Left Motion
    device_class: motion
  - platform: secplus_gdo
    secplus_gdo_id: gdo_left
    type: obstruction
    name: Left Obstruction
    device_class: problem
  - platform: secplus_gdo
    secplus_gdo_id: gdo_left
    type: motor
    name: Left Motor
    device_class: running
  - platform: secplus_gdo
    secplus_gdo_id: gdo_left
    type: button
    name: Left Wall Button

sensor:
  - platform: secplus_gdo
    secplus_gdo_id: gdo_left
    type: openings
    name: Left Openings
    icon: mdi:counter
    state_class: total_increasing

switch:
  - platform: secplus_gdo
    secplus_gdo_id: gdo_left
    type: learn
    name: Left Learn
    entity_category: config
  - platform: secplus_gdo
    secplus_gdo_id: gdo_left
    type: toggle_only
    name: Left Toggle Only
    entity_category: config

select:
  - platform: secplus_gdo
    secplus_gdo_id: gdo_left
    name: Left Protocol
    entity_category: config

number:
  - platform: secplus_gdo
    secplus_gdo_id: gdo_left
    type: open_duration
    name: Left Open Duration
    unit_of_measurement: ms
    entity_category: config
  - platform: secplus_gdo
    secplus_gdo_id: gdo_left
    type: close_duration
    name: Left Close Duration
    unit_of_measurement: ms
    entity_category: config
  - platform: secplus_gdo
    secplus_gdo_id: gdo_left
    type: client_id
    name: Left Client ID
    entity_category: config
  - platform: secplus_gdo
    secplus_gdo_id: gdo_left
    type: rolling_code
    name: Left Rolling Code
    entity_category: config
