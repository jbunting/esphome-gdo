# Three garage door openers on one classic ESP32.
#
# A classic ESP32 has exactly three hardware UARTs (0, 1, 2). To drive three
# openers we use ALL of them, which means giving up the serial console (UART0):
#   * logger: baud_rate: 0  disables UART logging (logs still go over the API),
#     freeing UART0 for the third opener.
#   * gdolib remaps each UART to the pins below via the GPIO matrix, so UART0 is
#     NOT on its default GPIO1/GPIO3 console pins.
#
# Trade-off: with no serial console you flash over OTA (or USB-JTAG). Do the
# very first flash over USB, add your WiFi + OTA, then update wirelessly.
#
# Every uart_num is set explicitly (0/1/2). Auto-assignment starts at UART1 to
# protect the console, and it doesn't coordinate with explicit values, so for a
# 3-UART build pin them all down yourself.
esphome:
  name: garage-controller-3

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Disable the UART console so UART0 is available for an opener. Logs remain
# available over the ESPHome API / OTA.
logger:
  baud_rate: 0

api:
ota:
  - platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

external_components:
  - source:
      type: local
      path: components
    components: [secplus_gdo]

secplus_gdo:
  - id: gdo_1
    uart_num: 0        # UART0, freed by disabling the console
    tx_pin: 17
    rx_pin: 16
    invert_uart: true
  - id: gdo_2
    uart_num: 1
    tx_pin: 19
    rx_pin: 18
    invert_uart: true
  - id: gdo_3
    uart_num: 2
    tx_pin: 22
    rx_pin: 21
    invert_uart: true

cover:
  - platform: secplus_gdo
    secplus_gdo_id: gdo_1
    name: Garage Door 1
    device_class: garage
  - platform: secplus_gdo
    secplus_gdo_id: gdo_2
    name: Garage Door 2
    device_class: garage
  - platform: secplus_gdo
    secplus_gdo_id: gdo_3
    name: Garage Door 3
    device_class: garage

light:
  - platform: secplus_gdo
    secplus_gdo_id: gdo_1
    name: Garage Light 1
  - platform: secplus_gdo
    secplus_gdo_id: gdo_2
    name: Garage Light 2
  - platform: secplus_gdo
    secplus_gdo_id: gdo_3
    name: Garage Light 3

# Any of the other entity types (lock, binary_sensor, sensor, switch, select,
# number) attach to a specific opener the same way, via secplus_gdo_id.
