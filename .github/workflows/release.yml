name: Release

# Auto-releases after CI succeeds on main, plus a manual trigger. There is no
# binary to publish — this is a source-consumed ESPHome external component — so a
# "release" is a git tag plus a GitHub Release (GitHub attaches the source
# archive). Consumers pin a version:  github://jbunting/esphome-gdo@2026.7.0
#
# Gating on CI (via workflow_run) means broken commits are never released.
# Because CI cancels superseded runs on main, a burst of merges collapses into a
# single successful CI run and therefore a single release — no explicit debounce
# needed.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (blank = auto CalVer YYYY.M.patch)"
        required: false
        default: ""
      prerelease:
        description: "Mark as a pre-release"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    # Only after a successful CI run, or a manual dispatch.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full history + tags to compute the version / diff
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # Skip docs-only merges: only the component sources under components/ are
      # what consumers import, so a README/examples/tests/CI change shouldn't cut
      # a release. Manual dispatch bypasses this check.
      - name: Gate on component changes
        id: gate
        if: github.event_name == 'workflow_run'
        run: |
          set -euo pipefail
          last="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          if [ -z "$last" ]; then
            echo "No previous release tag; proceeding."
            echo "release=true" >> "$GITHUB_OUTPUT"
          elif [ -n "$(git diff --name-only "$last"..HEAD -- components/)" ]; then
            echo "components/ changed since $last; releasing."
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            echo "No component changes since $last; skipping release."
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine version
        id: ver
        if: steps.gate.outputs.release != 'false'
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          if [ -z "$version" ]; then
            # CalVer: YYYY.M (no leading zero on month), patch auto-increments
            # within the month.
            ym="$(date +%Y.%-m)"
            last="$(git tag -l "${ym}.*" | sed "s/^${ym}\.//" | grep -E '^[0-9]+$' | sort -n | tail -1 || true)"
            if [ -z "$last" ]; then patch=0; else patch=$((last + 1)); fi
            version="${ym}.${patch}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Releasing $version"

      - name: Verify tag does not exist
        if: steps.gate.outputs.release != 'false'
        run: |
          if git rev-parse "refs/tags/${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.ver.outputs.version }} already exists"
            exit 1
          fi

      - name: Create release
        if: steps.gate.outputs.release != 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.ver.outputs.version }}" \
            --title "${{ steps.ver.outputs.version }}" \
            --target "${{ github.event.workflow_run.head_sha || github.sha }}" \
            --generate-notes \
            ${{ inputs.prerelease && '--prerelease' || '' }}
