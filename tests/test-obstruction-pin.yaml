# Exercises the discrete obstruction-sensor input path (obstruction_pin +
# obstruction_from_status: false) rather than deriving obstruction from Sec+ 2.0
# status frames. No wifi/api, so no secrets are needed.
esphome:
  name: gdo-test-obst-pin

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

external_components:
  - source:
      type: local
      path: ../components
    components: [secplus_gdo]

secplus_gdo:
  - id: gdo
    tx_pin: 17
    rx_pin: 16
    obstruction_pin: 4
    obstruction_from_status: false

cover:
  - platform: secplus_gdo
    name: Test Door
    device_class: garage

binary_sensor:
  - platform: secplus_gdo
    type: obstruction
    name: Test Obstruction
    device_class: problem
